<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>反向贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  -webkit-tap-highlight-color: transparent;
}
body {
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: #eee;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

#gameContainer {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}
canvas {
  border-radius: 10px;
  box-shadow: 0 0 60px rgba(0, 0, 0, 0.6), 0 0 120px rgba(48, 43, 99, 0.4);
  cursor: default;
  display: block;
}

/* Volume and Help buttons - top corners, smaller */
#volBtn {
  position: fixed;
  top: 8px;
  right: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid #555;
  border-radius: 6px;
  color: #eee;
  font-size: 14px;
  padding: 4px 8px;
  cursor: pointer;
  transition: background 0.2s;
  line-height: 1;
  z-index: 10;
  -webkit-tap-highlight-color: transparent;
}
#volBtn:hover { background: rgba(255,255,255,0.2); }
#volBtn.muted { color: #666; border-color: #444; }

#helpBtn {
  position: fixed; top: 8px; left: 8px;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid #555;
  color: #eee; font-size: 14px; font-weight: bold; cursor: pointer;
  transition: background 0.2s; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
#helpBtn:hover { background: rgba(255,255,255,0.2); }

/* Help overlay - full screen on mobile, larger text */
#helpOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 100;
  display: none; justify-content: center; align-items: center;
}
#helpOverlay.show { display: flex; }
#helpOverlay .help-box {
  background: linear-gradient(135deg, #1a1a3e, #0d0d1f);
  border: 1px solid rgba(255,215,0,0.3); border-radius: 16px;
  padding: 24px 20px; max-width: 90vw; width: 100%; max-height: 90vh; overflow-y: auto; text-align: center;
  box-shadow: 0 0 40px rgba(255,215,0,0.1);
}
#helpOverlay h2 {
  color: #ffd700; font-size: 20px; margin-bottom: 16px;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
}
#helpOverlay .help-grid {
  text-align: left; font-size: 16px; color: #ccc; line-height: 2.2;
  margin-bottom: 16px;
}
#helpOverlay .help-grid kbd {
  background: rgba(255,255,255,0.12); padding: 2px 8px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.2); font-family: inherit; margin-right: 6px;
  font-size: 14px;
}
#helpOverlay .close-hint {
  color: #666; font-size: 14px;
}
#helpOverlay .rules-text {
  text-align: left; font-size: 15px; color: #aaa; line-height: 2;
  margin-bottom: 12px;
}

/* Controls area below canvas */
#controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 12px;
  gap: 8px;
  user-select: none;
  -webkit-user-select: none;
}

/* Trap button - prominent red accent */
#trapBtn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(255, 50, 50, 0.2);
  border: 2px solid rgba(255, 80, 80, 0.6);
  color: #ff6b6b;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 15px rgba(255, 50, 50, 0.3);
  transition: background 0.15s, transform 0.1s;
}
#trapBtn:active {
  background: rgba(255, 50, 50, 0.5);
  transform: scale(0.93);
}
#trapBtn .trap-count {
  font-size: 11px;
  color: rgba(255,150,150,0.6);
  display: block;
  margin-top: 2px;
}

/* D-pad */
#dpad {
  position: relative;
  width: 180px;
  height: 180px;
}
.dpad-btn {
  position: absolute;
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: rgba(255,255,255,0.7);
  font-size: 24px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, transform 0.1s;
}
.dpad-btn:active {
  background: rgba(255,255,255,0.2);
  transform: scale(0.93);
}
#dpadUp { top: 0; left: 50%; transform: translateX(-50%); }
#dpadDown { bottom: 0; left: 50%; transform: translateX(-50%); }
#dpadLeft { left: 0; top: 50%; transform: translateY(-50%); }
#dpadRight { right: 0; top: 50%; transform: translateY(-50%); }
#dpadUp:active { transform: translateX(-50%) scale(0.93); }
#dpadDown:active { transform: translateX(-50%) scale(0.93); }
#dpadLeft:active { transform: translateY(-50%) scale(0.93); }
#dpadRight:active { transform: translateY(-50%) scale(0.93); }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
</div>
<div id="controls">
  <button id="trapBtn">陷阱<span class="trap-count" id="trapCountLabel">5</span></button>
  <div id="dpad">
    <button class="dpad-btn" id="dpadUp">&#9650;</button>
    <button class="dpad-btn" id="dpadDown">&#9660;</button>
    <button class="dpad-btn" id="dpadLeft">&#9664;</button>
    <button class="dpad-btn" id="dpadRight">&#9654;</button>
  </div>
</div>
<button id="volBtn">&#128266;</button>
<button id="helpBtn">?</button>
<div id="helpOverlay">
  <div class="help-box">
    <h2>&#127820; 反向贪吃蛇 - 玩法说明</h2>
    <div class="help-grid">
      <div><kbd>&#8593;</kbd><kbd>&#8595;</kbd><kbd>&#8592;</kbd><kbd>&#8594;</kbd> <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动食物</div>
      <div><kbd>空格</kbd> 放置陷阱（阻挡蛇的移动）</div>
      <div><kbd>空格/点击</kbd> 开始游戏 / 重新开始</div>
      <div>滑动屏幕 / 方向按钮 移动食物</div>
      <div>点击陷阱按钮 放置陷阱</div>
    </div>
    <div class="rules-text">
      &#8226; 你是"食物"，AI 蛇会追逐你<br>
      &#8226; 存活时间 = 得分<br>
      &#8226; 每 15 秒新增一条蛇<br>
      &#8226; 每 30 秒所有蛇加速<br>
      &#8226; 陷阱最多 5 个，每 4 秒恢复 1 个<br>
      &#8226; 陷阱持续 5 秒，蛇靠近或踩中会被减速
    </div>
    <div class="close-hint">按 Esc 或点击背景关闭</div>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

/* --- Canvas sizing (internal resolution stays 400x400, displayed responsively) --- */
const GRID = 20;
const COLS = 20, ROWS = 20;
const W = COLS * GRID; // 400
const H = ROWS * GRID; // 400
canvas.width = W;
canvas.height = H;

function resizeCanvas() {
  var avail = Math.min(window.innerWidth - 16, window.innerHeight - 300);
  avail = Math.max(avail, 200);
  var displaySize = Math.floor(avail);
  var dpr = window.devicePixelRatio || 1;
  canvas.style.width = displaySize + 'px';
  canvas.style.height = displaySize + 'px';
  canvas.style.imageRendering = 'pixelated';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* --- Audio engine (Web Audio API) --- */
var Audio = (function () {
  var ac, muted = localStorage.getItem('reverse_snake_muted') === '1';
  var bgmGain, bgmTimer, bgmPlaying = false;
  var init = function () { if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); };

  var note = function (freq, dur, type, vol, delay) {
    if (muted) return;
    type = type || 'square'; vol = vol || 0.15; delay = delay || 0;
    init();
    var t = ac.currentTime + delay;
    var o = ac.createOscillator();
    var g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(ac.destination);
    o.start(t);
    o.stop(t + dur);
  };

  var BEAT = 0.18;
  var melody = [330,392,440,392,330,294,330,392,440,523,440,392,330,294,262,294];
  var bass   = [110,110,147,147,98,98,110,110,147,147,98,98,110,110,73,73];
  var loopDur = melody.length * BEAT;

  var playLoop = function () {
    if (muted || !ac) return;
    var t = ac.currentTime + 0.05;
    for (var i = 0; i < melody.length; i++) {
      var o = ac.createOscillator();
      var g = ac.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(melody[i], t + i * BEAT);
      g.gain.setValueAtTime(0.025, t + i * BEAT);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * BEAT + BEAT * 0.8);
      o.connect(g).connect(bgmGain);
      o.start(t + i * BEAT);
      o.stop(t + i * BEAT + BEAT * 0.85);
    }
    for (var i = 0; i < bass.length; i++) {
      var o = ac.createOscillator();
      var g = ac.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(bass[i], t + i * BEAT);
      g.gain.setValueAtTime(0.04, t + i * BEAT);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * BEAT + BEAT * 0.9);
      o.connect(g).connect(bgmGain);
      o.start(t + i * BEAT);
      o.stop(t + i * BEAT + BEAT * 0.95);
    }
  };

  var startBGM = function () {
    if (bgmPlaying || muted) return;
    init();
    if (!bgmGain) { bgmGain = ac.createGain(); bgmGain.connect(ac.destination); }
    bgmGain.gain.setValueAtTime(1, ac.currentTime);
    bgmPlaying = true;
    playLoop();
    bgmTimer = setInterval(playLoop, loopDur * 1000);
  };

  var stopBGM = function () {
    if (!bgmPlaying) return;
    clearInterval(bgmTimer);
    bgmTimer = null;
    bgmPlaying = false;
  };

  var setMuted = function (v) {
    muted = v;
    localStorage.setItem('reverse_snake_muted', muted ? '1' : '0');
    if (bgmGain && ac) {
      bgmGain.gain.linearRampToValueAtTime(muted ? 0 : 1, ac.currentTime + 0.05);
    }
  };

  return {
    start: function () {
      note(440, 0.1, 'square', 0.12);
      note(554, 0.1, 'square', 0.12, 0.08);
      note(659, 0.14, 'square', 0.12, 0.16);
    },
    trapPlace: function () {
      note(600, 0.08, 'sine', 0.1);
      note(900, 0.12, 'sine', 0.1, 0.05);
    },
    snakeHitTrap: function () {
      note(200, 0.15, 'sawtooth', 0.08);
    },
    snakeSpawn: function () {
      note(220, 0.1, 'sawtooth', 0.06);
      note(165, 0.15, 'sawtooth', 0.06, 0.08);
    },
    speedUp: function () {
      note(440, 0.06, 'square', 0.08);
      note(554, 0.06, 'square', 0.08, 0.06);
      note(659, 0.1, 'square', 0.08, 0.12);
    },
    gameOver: function () {
      stopBGM();
      note(440, 0.2, 'square', 0.15);
      note(349, 0.25, 'square', 0.15, 0.18);
      note(262, 0.4, 'square', 0.15, 0.4);
    },
    milestone: function () {
      note(523, 0.08, 'sine', 0.12);
      note(659, 0.08, 'sine', 0.12, 0.07);
      note(784, 0.12, 'sine', 0.12, 0.14);
    },
    setMuted: setMuted, startBGM: startBGM, stopBGM: stopBGM
  };
})();

var volBtn = document.getElementById('volBtn');
var muted = localStorage.getItem('reverse_snake_muted') === '1';
if (muted) { volBtn.innerHTML = '&#128263;'; volBtn.classList.add('muted'); }
volBtn.addEventListener('click', function () {
  muted = !muted;
  Audio.setMuted(muted);
  volBtn.innerHTML = muted ? '&#128263;' : '&#128266;';
  volBtn.classList.toggle('muted', muted);
});

// Help overlay
var helpOverlay = document.getElementById('helpOverlay');
var helpBtnEl = document.getElementById('helpBtn');
var helpVisible = false;
helpBtnEl.addEventListener('click', function () {
  helpVisible = true;
  helpOverlay.classList.add('show');
});
function closeHelp() {
  helpVisible = false;
  helpOverlay.classList.remove('show');
}
helpOverlay.addEventListener('click', function (e) {
  if (e.target === helpOverlay) closeHelp();
});
document.addEventListener('keydown', function (e) {
  if (helpVisible && e.code === 'Escape') closeHelp();
});

/* --- Game constants --- */
var MAX_TRAPS = 5;
var TRAP_DURATION = 5000;
var TRAP_REGEN_INTERVAL = 4000;
var SNAKE_SPAWN_INTERVAL = 15000;
var SPEED_UP_INTERVAL = 30000;
var INITIAL_SNAKE_SPEED = 220; // ms per move
var MIN_SNAKE_SPEED = 60;
var SPEED_DECREASE = 20; // ms faster per speed-up
var COUNTDOWN_SECONDS = 3;

/* --- Game state --- */
var state = 'menu'; // menu | countdown | playing | gameover
var score = 0;
var highScore = parseInt(localStorage.getItem('reverse_snake_high') || '0');
var player = { x: 10, y: 10 };
var dirX = 0, dirY = 0;
var nextDirX = 0, nextDirY = 0;
var snakes = [];
var traps = [];
var trapCount = MAX_TRAPS;
var trapRegenTimer = 0;
var particles = [];
var bgStars = [];
var gameStartTime = 0;
var lastSnakeSpawn = 0;
var lastSpeedUp = 0;
var snakeSpeed = INITIAL_SNAKE_SPEED;
var lastSnakeMove = 0;
var countdownValue = COUNTDOWN_SECONDS;
var countdownTimer = 0;
var moveTimer = 0;
var elapsed = 0;
var shakeTimer = 0;
var shakeIntensity = 0;
var speedLevel = 0;
var lastTimestamp = 0;

// Initialize background stars
for (var i = 0; i < 50; i++) {
  bgStars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + 0.3,
    alpha: Math.random() * 0.4 + 0.1,
    pulse: Math.random() * Math.PI * 2
  });
}

/* --- Snake class --- */
function createSnake(x, y) {
  var headColor = Math.random() > 0.5 ? '#00ffcc' : '#39ff14';
  var bodyColor = '#1a3a2a';
  var length = 3 + Math.min(3, Math.floor(snakes.length / 2));
  var segments = [];
  // spawn moving away from center initially
  var dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  var dir = dirs[Math.floor(Math.random() * dirs.length)];
  for (var i = 0; i < length; i++) {
    segments.push({ x: x - dir.x * i, y: y - dir.y * i });
  }
  return {
    segments: segments,
    headColor: headColor,
    bodyColor: bodyColor,
    dir: { x: dir.x, y: dir.y },
    moveAccum: 0
  };
}

function spawnSnake() {
  // Pick a random edge position
  var x, y;
  var edge = Math.floor(Math.random() * 4);
  switch (edge) {
    case 0: x = 0; y = Math.floor(Math.random() * ROWS); break;
    case 1: x = COLS - 1; y = Math.floor(Math.random() * ROWS); break;
    case 2: x = Math.floor(Math.random() * COLS); y = 0; break;
    case 3: x = Math.floor(Math.random() * COLS); y = ROWS - 1; break;
  }
  // Don't spawn too close to player
  if (Math.abs(x - player.x) + Math.abs(y - player.y) < 6) {
    x = (x + Math.floor(COLS / 2)) % COLS;
    y = (y + Math.floor(ROWS / 2)) % ROWS;
  }
  snakes.push(createSnake(x, y));
  Audio.snakeSpawn();
}

/* --- BFS pathfinding for snake AI --- */
function bfs(startX, startY, targetX, targetY) {
  var key = function (x, y) { return x + ',' + y; };
  var visited = new Set();
  var queue = [{ x: startX, y: startY, path: [] }];
  visited.add(key(startX, startY));

  var dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];

  while (queue.length > 0) {
    var cur = queue.shift();
    if (cur.x === targetX && cur.y === targetY) {
      return cur.path.length > 0 ? cur.path[0] : dirs[Math.floor(Math.random() * 4)];
    }
    // Shuffle dirs for more natural movement
    var shuffled = dirs.slice().sort(function () { return Math.random() - 0.5; });
    for (var di = 0; di < shuffled.length; di++) {
      var d = shuffled[di];
      var nx = cur.x + d.x;
      var ny = cur.y + d.y;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
      if (visited.has(key(nx, ny))) continue;
      // Check if blocked by another snake body (not head) or trap
      var blocked = false;
      for (var si = 0; si < snakes.length; si++) {
        for (var j = 1; j < snakes[si].segments.length; j++) {
          if (snakes[si].segments[j].x === nx && snakes[si].segments[j].y === ny) { blocked = true; break; }
        }
        if (blocked) break;
      }
      // Check traps
      for (var ti = 0; ti < traps.length; ti++) {
        if (traps[ti].col === nx && traps[ti].row === ny) { blocked = true; break; }
      }
      if (blocked) continue;
      visited.add(key(nx, ny));
      var newPath = [d].concat(cur.path);
      queue.push({ x: nx, y: ny, path: newPath });
    }
  }
  // No path found, return random valid direction
  var fallbackDirs = dirs.slice().sort(function () { return Math.random() - 0.5; });
  for (var fi = 0; fi < fallbackDirs.length; fi++) {
    var fd = fallbackDirs[fi];
    var fnx = startX + fd.x;
    var fny = startY + fd.y;
    if (fnx >= 0 && fnx < COLS && fny >= 0 && fny < ROWS) {
      // Don't move onto another snake's body
      var valid = true;
      for (var si2 = 0; si2 < snakes.length; si2++) {
        for (var j2 = 1; j2 < snakes[si2].segments.length; j2++) {
          if (snakes[si2].segments[j2].x === fnx && snakes[si2].segments[j2].y === fny) { valid = false; break; }
        }
        if (!valid) break;
      }
      if (valid) return fd;
    }
  }
  return dirs[0];
}

/* --- Particles --- */
function spawnParticles(x, y, color, count) {
  count = count || 20;
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 1 + Math.random() * 5;
    particles.push({
      x: x * GRID + GRID / 2,
      y: y * GRID + GRID / 2,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.025,
      size: 2 + Math.random() * 5,
      color: color
    });
  }
}

function spawnDeathExplosion() {
  var cx = player.x * GRID + GRID / 2;
  var cy = player.y * GRID + GRID / 2;
  var colors = ['#ffd700', '#ff8c00', '#ff4500', '#ffff00', '#ff6347'];
  for (var i = 0; i < 60; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 1 + Math.random() * 7;
    particles.push({
      x: cx, y: cy,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.01 + Math.random() * 0.02,
      size: 3 + Math.random() * 7,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

/* --- Input --- */
var keys = {};
document.addEventListener('keydown', function (e) {
  keys[e.code] = true;

  if (state === 'menu') {
    if (e.code === 'Space' || e.code === 'Enter') {
      startCountdown();
    }
    return;
  }

  if (state === 'gameover') {
    if (e.code === 'Space' || e.code === 'Enter') {
      startCountdown();
    }
    return;
  }

  if (state === 'playing') {
    if (e.code === 'Space') {
      e.preventDefault();
      placeTrap();
      return;
    }

    var keyMap = {
      ArrowUp: { x: 0, y: -1 }, KeyW: { x: 0, y: -1 },
      ArrowDown: { x: 0, y: 1 }, KeyS: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 }, KeyA: { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0 }, KeyD: { x: 1, y: 0 }
    };
    var d = keyMap[e.code];
    if (d) {
      e.preventDefault();
      // Bean can move any direction -- no 180 degree restriction
      nextDirX = d.x;
      nextDirY = d.y;
    }
  }
});
document.addEventListener('keyup', function (e) { keys[e.code] = false; });

// Mouse tracking for buttons
var mouseX = W / 2, mouseY = H / 2;
canvas.addEventListener('mousemove', function (e) {
  var rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top) * (H / rect.height);
});

// Click to start / restart / home
canvas.addEventListener('click', function (e) {
  // Check home button
  if (window._homeBtnRect) {
    var b = window._homeBtnRect;
    if (mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h) {
      window.location.href = '../index.html';
      return;
    }
  }
  if (state === 'menu' || state === 'gameover') {
    startCountdown();
  }
});

// --- Touch input for canvas (click/tap for start/restart/home, plus swipe) ---
var touchStartX = 0, touchStartY = 0, touchStartTime = 0;
var touchMoved = false;

function getCanvasCoords(touch) {
  var rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) * (W / rect.width),
    y: (touch.clientY - rect.top) * (H / rect.height)
  };
}

canvas.addEventListener('touchstart', function (e) {
  e.preventDefault();
  var touch = e.touches[0];
  var coords = getCanvasCoords(touch);
  touchStartX = coords.x;
  touchStartY = coords.y;
  touchStartTime = Date.now();
  touchMoved = false;
  mouseX = coords.x;
  mouseY = coords.y;
}, { passive: false });

canvas.addEventListener('touchmove', function (e) {
  e.preventDefault();
  var touch = e.touches[0];
  var coords = getCanvasCoords(touch);
  var dx = coords.x - touchStartX;
  var dy = coords.y - touchStartY;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 15) {
    touchMoved = true;
    // Determine primary direction
    if (Math.abs(dx) > Math.abs(dy)) {
      nextDirX = dx > 0 ? 1 : -1;
      nextDirY = 0;
    } else {
      nextDirX = 0;
      nextDirY = dy > 0 ? 1 : -1;
    }
  }
  mouseX = coords.x;
  mouseY = coords.y;
}, { passive: false });

canvas.addEventListener('touchend', function (e) {
  e.preventDefault();
  var elapsed = Date.now() - touchStartTime;
  if (!touchMoved && elapsed < 300) {
    // Tap -- same as click
    if (window._homeBtnRect) {
      var b = window._homeBtnRect;
      if (mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h) {
        window.location.href = '../index.html';
        return;
      }
    }
    if (state === 'menu' || state === 'gameover') {
      startCountdown();
    }
  }
}, { passive: false });

// --- D-pad touch/click handlers ---
function dpadDirection(dx, dy) {
  if (state === 'menu' || state === 'gameover') {
    startCountdown();
    return;
  }
  nextDirX = dx;
  nextDirY = dy;
}

// D-pad buttons -- handle both touch and mouse
var dpadConfig = {
  dpadUp:    { dx: 0, dy: -1 },
  dpadDown:  { dx: 0, dy: 1 },
  dpadLeft:  { dx: -1, dy: 0 },
  dpadRight: { dx: 1, dy: 0 }
};
for (var btnId in dpadConfig) {
  (function (id, cfg) {
    var btn = document.getElementById(id);
    btn.addEventListener('touchstart', function (e) {
      e.preventDefault();
      e.stopPropagation();
      dpadDirection(cfg.dx, cfg.dy);
    }, { passive: false });
    btn.addEventListener('mousedown', function (e) {
      e.stopPropagation();
      dpadDirection(cfg.dx, cfg.dy);
    });
  })(btnId, dpadConfig[btnId]);
}

// --- Trap button ---
var trapBtnEl = document.getElementById('trapBtn');
var trapCountLabel = document.getElementById('trapCountLabel');
function handleTrapPress() {
  if (state === 'menu' || state === 'gameover') {
    startCountdown();
    return;
  }
  placeTrap();
}
trapBtnEl.addEventListener('touchstart', function (e) {
  e.preventDefault();
  e.stopPropagation();
  handleTrapPress();
}, { passive: false });
trapBtnEl.addEventListener('mousedown', function (e) {
  e.stopPropagation();
  handleTrapPress();
});

/* --- Game logic --- */
function startCountdown() {
  state = 'countdown';
  countdownValue = COUNTDOWN_SECONDS;
  countdownTimer = 0;
  player = { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) };
  dirX = 0; dirY = 0;
  nextDirX = 0; nextDirY = 0;
  snakes = [];
  traps = [];
  particles = [];
  trapCount = MAX_TRAPS;
  trapRegenTimer = 0;
  snakeSpeed = INITIAL_SNAKE_SPEED;
  speedLevel = 0;
  score = 0;
  elapsed = 0;
  shakeTimer = 0;
  lastTimestamp = performance.now();
  moveTimer = 0;
  lastSnakeMove = 0;
  gameStartTime = 0;
  lastSnakeSpawn = 0;
  lastSpeedUp = 0;
  Audio.start();
  Audio.startBGM();
}

function startGame() {
  state = 'playing';
  gameStartTime = Date.now();
  lastSnakeSpawn = 0;
  lastSpeedUp = 0;
  lastSnakeMove = 0;
  moveTimer = 0;
  // Spawn first snake immediately at an edge
  spawnSnake();
}

function placeTrap() {
  if (trapCount <= 0 || state !== 'playing') return;
  // Check if cell already has a trap
  var already = false;
  for (var i = 0; i < traps.length; i++) {
    if (traps[i].col === player.x && traps[i].row === player.y) { already = true; break; }
  }
  if (already) return;
  traps.push({
    col: player.x,
    row: player.y,
    placed: Date.now(),
    duration: TRAP_DURATION
  });
  trapCount--;
  Audio.trapPlace();
}

function endGame() {
  state = 'gameover';
  score = Math.floor(elapsed);
  Audio.gameOver();
  spawnDeathExplosion();
  shakeTimer = 20;
  shakeIntensity = 10;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('reverse_snake_high', highScore);
  }
}

/* --- Update --- */
function update(dt) {
  // Update particles always
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.dx;
    p.y += p.dy;
    p.dx *= 0.97;
    p.dy *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (shakeTimer > 0) shakeTimer--;

  if (state === 'countdown') {
    countdownTimer += dt;
    if (countdownTimer >= 1000) {
      countdownTimer -= 1000;
      countdownValue--;
      if (countdownValue <= 0) {
        startGame();
      }
    }
    return;
  }

  if (state !== 'playing') return;

  // Update elapsed time
  var now = Date.now();
  elapsed = (now - gameStartTime) / 1000;

  // Player movement (smooth, continuous)
  var playerMoveInterval = 100; // ms per grid cell
  moveTimer += dt;
  if (moveTimer >= playerMoveInterval && (nextDirX !== 0 || nextDirY !== 0)) {
    dirX = nextDirX;
    dirY = nextDirY;
    var nx = player.x + dirX;
    var ny = player.y + dirY;
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
      player.x = nx;
      player.y = ny;
    }
    moveTimer = 0;
  }

  // Also allow continuous smooth movement via key holding
  // (already handled by the interval-based movement above)

  // Trap regeneration
  trapRegenTimer += dt;
  if (trapRegenTimer >= TRAP_REGEN_INTERVAL && trapCount < MAX_TRAPS) {
    trapCount++;
    trapRegenTimer = 0;
  }

  // Remove expired traps
  for (var i = traps.length - 1; i >= 0; i--) {
    if (now - traps[i].placed > traps[i].duration) {
      traps.splice(i, 1);
    }
  }

  // Spawn new snakes every SNAKE_SPAWN_INTERVAL
  if (now - gameStartTime - lastSnakeSpawn >= SNAKE_SPAWN_INTERVAL) {
    spawnSnake();
    lastSnakeSpawn = now - gameStartTime;
  }

  // Speed up every SPEED_UP_INTERVAL
  if (now - gameStartTime - lastSpeedUp >= SPEED_UP_INTERVAL) {
    snakeSpeed = Math.max(MIN_SNAKE_SPEED, snakeSpeed - SPEED_DECREASE);
    speedLevel++;
    lastSpeedUp = now - gameStartTime;
    Audio.speedUp();
  }

  // Milestone sounds
  var prevMilestone = Math.floor((elapsed - dt / 1000) / 30);
  var currMilestone = Math.floor(elapsed / 30);
  if (currMilestone > prevMilestone) {
    Audio.milestone();
  }

  // Update snake AI movement
  lastSnakeMove += dt;
  if (lastSnakeMove >= snakeSpeed) {
    lastSnakeMove = 0;

    for (var si = 0; si < snakes.length; si++) {
      var snake = snakes[si];
      var head = snake.segments[0];
      var targetX = player.x;
      var targetY = player.y;

      // Check if any trap slows this snake
      var slowed = false;
      for (var ti = 0; ti < traps.length; ti++) {
        if (Math.abs(head.x - traps[ti].col) <= 1 && Math.abs(head.y - traps[ti].row) <= 1) {
          slowed = true;
          break;
        }
      }

      // If slowed by trap, skip movement this turn (effectively halving speed)
      if (slowed) {
        Audio.snakeHitTrap();
        continue;
      }

      // BFS toward player
      var move = bfs(head.x, head.y, targetX, targetY);

      // Check if new position is on a trap (removes trap and slows snake)
      var newHeadX = head.x + move.x;
      var newHeadY = head.y + move.y;
      for (var ti2 = traps.length - 1; ti2 >= 0; ti2--) {
        if (traps[ti2].col === newHeadX && traps[ti2].row === newHeadY) {
          traps.splice(ti2, 1);
          Audio.snakeHitTrap();
          // Don't move this turn (slowed)
          break;
        }
      }

      // Validate move
      if (newHeadX >= 0 && newHeadX < COLS && newHeadY >= 0 && newHeadY < ROWS) {
        var newHead = { x: newHeadX, y: newHeadY };
        snake.segments.unshift(newHead);
        snake.segments.pop();
        snake.dir = { x: move.x, y: move.y };
      }
    }
  }

  // Check collision: snake head hits player
  for (var ci = 0; ci < snakes.length; ci++) {
    var chead = snakes[ci].segments[0];
    if (chead.x === player.x && chead.y === player.y) {
      endGame();
      return;
    }
  }
}

/* --- Draw --- */
function draw() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0 && shakeIntensity > 0) {
    var sx = (Math.random() - 0.5) * shakeIntensity;
    var sy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(sx, sy);
  }

  // Background gradient
  var bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#0f0c29');
  bgGrad.addColorStop(0.5, '#1a1a3e');
  bgGrad.addColorStop(1, '#24243e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  for (var x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID, 0);
    ctx.lineTo(x * GRID, H);
    ctx.stroke();
  }
  for (var y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID);
    ctx.lineTo(W, y * GRID);
    ctx.stroke();
  }

  // Background stars
  var time = Date.now() * 0.001;
  for (var si = 0; si < bgStars.length; si++) {
    var s = bgStars[si];
    var alpha = s.alpha * (0.6 + 0.4 * Math.sin(time * 1.5 + s.pulse));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw traps
  for (var ti = 0; ti < traps.length; ti++) {
    var t = traps[ti];
    var age = Date.now() - t.placed;
    var remaining = 1 - age / t.duration;
    var pulse = 0.6 + 0.4 * Math.sin(time * 4 + t.col);
    var cx = t.col * GRID + GRID / 2;
    var cy = t.row * GRID + GRID / 2;
    var radius = (GRID / 2 - 2) * (0.7 + 0.3 * pulse);

    // Glow
    ctx.shadowColor = '#ff3333';
    ctx.shadowBlur = 12 * remaining;
    ctx.fillStyle = 'rgba(255, 50, 50, ' + (0.3 * remaining * pulse) + ')';
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();

    // Inner ring
    ctx.strokeStyle = 'rgba(255, 80, 80, ' + (0.7 * remaining) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, radius * 0.6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // X mark
    ctx.strokeStyle = 'rgba(255, 120, 120, ' + (0.8 * remaining) + ')';
    ctx.lineWidth = 1.5;
    var xs = 3;
    ctx.beginPath();
    ctx.moveTo(cx - xs, cy - xs); ctx.lineTo(cx + xs, cy + xs);
    ctx.moveTo(cx + xs, cy - xs); ctx.lineTo(cx - xs, cy + xs);
    ctx.stroke();
  }

  // Draw snakes
  for (var si2 = 0; si2 < snakes.length; si2++) {
    var snake = snakes[si2];
    var segs = snake.segments;
    for (var i = segs.length - 1; i >= 0; i--) {
      var seg = segs[i];
      var sx = seg.x * GRID;
      var sy = seg.y * GRID;

      if (i === 0) {
        // Head
        ctx.shadowColor = snake.headColor;
        ctx.shadowBlur = 15;
        ctx.fillStyle = snake.headColor;
        ctx.beginPath();
        ctx.roundRect(sx + 1, sy + 1, GRID - 2, GRID - 2, 5);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Eyes
        ctx.fillStyle = '#111';
        var eyeR = 2.5;
        var e1x, e1y, e2x, e2y;
        if (snake.dir.x === 1) {
          e1x = sx + 14; e1y = sy + 5;
          e2x = sx + 14; e2y = sy + 13;
        } else if (snake.dir.x === -1) {
          e1x = sx + 5; e1y = sy + 5;
          e2x = sx + 5; e2y = sy + 13;
        } else if (snake.dir.y === -1) {
          e1x = sx + 5; e1y = sy + 5;
          e2x = sx + 13; e2y = sy + 5;
        } else {
          e1x = sx + 5; e1y = sy + 14;
          e2x = sx + 13; e2y = sy + 14;
        }
        ctx.beginPath();
        ctx.arc(e1x, e1y, eyeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e2x, e2y, eyeR, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Body
        var ratio = 1 - (i / segs.length);
        var alpha2 = 0.4 + 0.5 * ratio;
        ctx.fillStyle = 'rgba(26, 80, 50, ' + alpha2 + ')';
        ctx.beginPath();
        ctx.roundRect(sx + 1.5, sy + 1.5, GRID - 3, GRID - 3, 4);
        ctx.fill();
        // Subtle border
        ctx.strokeStyle = 'rgba(0, 255, 200, ' + (0.15 * ratio) + ')';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.roundRect(sx + 1.5, sy + 1.5, GRID - 3, GRID - 3, 4);
        ctx.stroke();
      }
    }
  }

  // Draw player (food orb)
  if (state !== 'gameover') {
    var px = player.x * GRID + GRID / 2;
    var py = player.y * GRID + GRID / 2;
    var pulse2 = 0.8 + 0.2 * Math.sin(time * 5);
    var baseRadius = (GRID / 2 - 1) * pulse2;

    // Outer glow
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 25 * pulse2;

    // Main orb gradient
    var orbGrad = ctx.createRadialGradient(px - 2, py - 2, 1, px, py, baseRadius);
    orbGrad.addColorStop(0, '#ffff88');
    orbGrad.addColorStop(0.4, '#ffd700');
    orbGrad.addColorStop(0.8, '#ff8c00');
    orbGrad.addColorStop(1, 'rgba(255, 100, 0, 0.3)');
    ctx.fillStyle = orbGrad;
    ctx.beginPath();
    ctx.arc(px, py, baseRadius, 0, Math.PI * 2);
    ctx.fill();

    // Inner highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.beginPath();
    ctx.arc(px - 2, py - 3, 3, 0, Math.PI * 2);
    ctx.fill();

    // Orbiting ring
    ctx.strokeStyle = 'rgba(255, 215, 0, ' + (0.2 + 0.15 * Math.sin(time * 3)) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(px, py, baseRadius + 4, time * 2, time * 2 + Math.PI * 1.2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(px, py, baseRadius + 4, time * 2 + Math.PI, time * 2 + Math.PI * 1.5);
    ctx.stroke();
  }

  // Particles
  for (var pi = 0; pi < particles.length; pi++) {
    var p2 = particles[pi];
    ctx.globalAlpha = p2.life;
    ctx.fillStyle = p2.color;
    ctx.beginPath();
    ctx.arc(p2.x, p2.y, p2.size * p2.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // --- HUD ---
  if (state === 'playing' || state === 'countdown') {
    drawHUD();
  }

  // --- Overlays ---
  if (state === 'menu') {
    drawMenuOverlay();
  } else if (state === 'countdown') {
    drawCountdownOverlay();
  } else if (state === 'gameover') {
    drawGameOverOverlay();
  }

  ctx.restore();
}

function drawHUD() {
  // Top bar background
  var hudGrad = ctx.createLinearGradient(0, 0, 0, 36);
  hudGrad.addColorStop(0, 'rgba(0,0,0,0.5)');
  hudGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = hudGrad;
  ctx.fillRect(0, 0, W, 36);

  ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';

  // Score (survival time)
  var timeStr = Math.floor(elapsed) + 's';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('生存: ' + timeStr, 10, 16);

  // Snake count
  ctx.fillStyle = '#39ff14';
  ctx.textAlign = 'center';
  ctx.fillText('蛇: ' + snakes.length, W / 2, 16);

  // Trap count
  ctx.textAlign = 'right';
  ctx.fillStyle = trapCount > 0 ? '#ff6b6b' : '#666';
  var trapStr = '陷阱: ';
  for (var i = 0; i < MAX_TRAPS; i++) {
    trapStr += i < trapCount ? '● ' : '○ ';
  }
  ctx.fillText(trapStr, W - 10, 16);

  // Speed level indicator
  if (speedLevel > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4500';
    ctx.font = 'bold 11px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('⚡ 加速 Lv.' + speedLevel, W / 2, 30);
  }

  // High score
  if (highScore > 0) {
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '11px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('最高: ' + highScore + 's', 10, 30);
  }
}

function drawCountdownOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  var scale = 1 + (1 - countdownTimer / 1000) * 0.3;
  var alpha = 1 - countdownTimer / 1000;

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(scale, scale);
  ctx.globalAlpha = alpha;
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 40;
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 80px "Segoe UI", system-ui, sans-serif';
  ctx.fillText(countdownValue > 0 ? countdownValue : 'GO!', 0, 20);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawGameOverOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // Game over title
  ctx.shadowColor = '#e74c3c';
  ctx.shadowBlur = 25;
  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold 42px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('游戏结束', W / 2, H / 2 - 90);
  ctx.shadowBlur = 0;

  // Score
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('存活: ' + score + ' 秒', W / 2, H / 2 - 45);

  // High score
  var isNewHigh = score >= highScore && score > 0;
  if (isNewHigh) {
    ctx.fillStyle = '#39ff14';
    ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('新纪录！', W / 2, H / 2 - 15);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '16px "Segoe UI", system-ui, sans-serif';
    ctx.fillText('最高分: ' + highScore + ' 秒', W / 2, H / 2 - 15);
  }

  // Snake count
  ctx.fillStyle = '#b0b0cc';
  ctx.font = '14px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('蛇的数量: ' + snakes.length + '  |  加速等级: ' + speedLevel, W / 2, H / 2 + 15);

  // Restart button
  var btnW = 180, btnH = 44;
  var btnX = W / 2 - btnW / 2, btnY = H / 2 + 40;
  var pulse = 0.95 + 0.05 * Math.sin(Date.now() * 0.005);

  ctx.save();
  ctx.translate(W / 2, btnY + btnH / 2);
  ctx.scale(pulse, pulse);
  ctx.translate(-W / 2, -(btnY + btnH / 2));

  var btnGrad = ctx.createLinearGradient(btnX, btnY, btnX + btnW, btnY + btnH);
  btnGrad.addColorStop(0, '#ffd700');
  btnGrad.addColorStop(1, '#ff8c00');
  ctx.fillStyle = btnGrad;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 10);
  ctx.fill();

  ctx.fillStyle = '#1a1a2e';
  ctx.font = 'bold 17px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('再来一局', W / 2, btnY + 29);
  ctx.restore();

  // Home button
  var hBtnW = 120, hBtnH = 32;
  var hBtnX = W / 2 - hBtnW / 2, hBtnY = H - 50;
  var hHovered = mouseX >= hBtnX && mouseX <= hBtnX + hBtnW && mouseY >= hBtnY && mouseY <= hBtnY + hBtnH;
  var hGrad = ctx.createLinearGradient(hBtnX, hBtnY, hBtnX + hBtnW, hBtnY + hBtnH);
  hGrad.addColorStop(0, hHovered ? 'rgba(100,180,255,0.35)' : 'rgba(100,180,255,0.12)');
  hGrad.addColorStop(1, hHovered ? 'rgba(100,180,255,0.35)' : 'rgba(100,180,255,0.12)');
  ctx.fillStyle = hGrad;
  ctx.beginPath();
  ctx.roundRect(hBtnX, hBtnY, hBtnW, hBtnH, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(hBtnX, hBtnY, hBtnW, hBtnH, 8);
  ctx.stroke();
  ctx.fillStyle = '#aaa';
  ctx.font = '13px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('返回主页', W / 2, hBtnY + 21);
  window._homeBtnRect = { x: hBtnX, y: hBtnY, w: hBtnW, h: hBtnH };
}

// Update trap count label
function updateTrapLabel() {
  trapCountLabel.textContent = trapCount;
}

/* --- Polyfill roundRect --- */
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (typeof r === 'number') r = [r];
    var rad = r[0] || 0;
    this.moveTo(x + rad, y);
    this.lineTo(x + w - rad, y);
    this.quadraticCurveTo(x + w, y, x + w, y + rad);
    this.lineTo(x + w, y + h - rad);
    this.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
    this.lineTo(x + rad, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - rad);
    this.lineTo(x, y + rad);
    this.quadraticCurveTo(x, y, x + rad, y);
    this.closePath();
  };
}

/* --- Game loop --- */
function loop(timestamp) {
  if (!lastTimestamp) lastTimestamp = timestamp;
  var dt = Math.min(timestamp - lastTimestamp, 50);
  // Skip if dt is suspiciously large (tab was inactive) -- don't advance game
  if (dt > 400 && state === 'playing') {
    lastTimestamp = timestamp;
    draw();
    updateTrapLabel();
    requestAnimationFrame(loop);
    return;
  }
  lastTimestamp = timestamp;

  update(dt);
  draw();
  updateTrapLabel();
  requestAnimationFrame(loop);
}

// Initial draw
draw();
updateTrapLabel();
requestAnimationFrame(loop);
</script>
