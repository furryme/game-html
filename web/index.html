<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小游戏合集</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0f0c29;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    -webkit-tap-highlight-color: transparent;
  }

  h1 {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: 4px;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
  }

  .subtitle {
    color: #8888aa;
    font-size: 1.1rem;
    margin-bottom: 50px;
    text-align: center;
  }

  .section {
    max-width: 960px;
    width: 100%;
    margin-bottom: 44px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, #444466, transparent);
  }

  .section-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-done { background: #2ecc71; box-shadow: 0 0 8px #2ecc7188; }
  .dot-wip  { background: #f39c12; box-shadow: 0 0 8px #f39c1288; }

  .section-subtitle {
    font-size: 0.85rem;
    color: #666688;
    margin-top: -14px;
    margin-bottom: 20px;
    padding-left: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .card {
    position: relative;
    border-radius: 18px;
    padding: 36px 28px 28px;
    text-decoration: none;
    color: #fff;
    transition: transform 0.25s, box-shadow 0.25s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    padding: 2px;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.03));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 18px 44px rgba(0,0,0,0.45);
  }

  .card:active { transform: translateY(-2px) scale(1.0); }

  .card-icon {
    font-size: 2.8rem;
    line-height: 1;
  }

  .card-title {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .card-desc {
    font-size: 0.92rem;
    color: #b0b0cc;
    line-height: 1.5;
  }

  .card-tag {
    display: inline-block;
    margin-top: auto;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    align-self: flex-start;
    letter-spacing: 0.5px;
  }

  /* Per-card gradients */
  .card-slime       { background: linear-gradient(145deg, #1a3a2a, #0d1f17); }
  .card-slime .card-tag { background: #2ecc7133; color: #5fd997; }

  .card-candy        { background: linear-gradient(145deg, #3a1a2a, #1f0d17); }
  .card-candy .card-tag { background: #e8439333; color: #fd79a8; }

  .card-brick        { background: linear-gradient(145deg, #3a2a1a, #1f170d); }
  .card-brick .card-tag { background: #f39c1233; color: #fdcb6e; }

  .card-dungeon      { background: linear-gradient(145deg, #1a1a3a, #0d0d1f); }
  .card-dungeon .card-tag { background: #6c5ce733; color: #a29bfe; }

  .card-element      { background: linear-gradient(145deg, #1a2a3a, #0d1717); }
  .card-element .card-tag { background: #00b89433; color: #55efc4; }

  .card-reverse      { background: linear-gradient(145deg, #2a1a1a, #170d0d); }
  .card-reverse .card-tag { background: #ff6b6b33; color: #ff8787; }

  .card-bomb         { background: linear-gradient(145deg, #3a3a1a, #1f1f0d); }
  .card-bomb .card-tag { background: #ffa50233; color: #ffc048; }

  .card-bug          { background: linear-gradient(145deg, #1a3a1a, #0d1f0d); }
  .card-bug .card-tag { background: #26de8133; color: #78e08f; }

  .card-loop         { background: linear-gradient(145deg, #2a1a3a, #170d1f); }
  .card-loop .card-tag { background: #a55eea33; color: #c593f9; }

  .card-time         { background: linear-gradient(145deg, #1a2a3a, #0d1720); }
  .card-time .card-tag { background: #4b7bec33; color: #7aa2f7; }

  .card-zen          { background: linear-gradient(145deg, #2a2a1a, #17170d); }
  .card-zen .card-tag { background: #ffd70033; color: #ffe066; }

  .card-chord        { background: linear-gradient(145deg, #1a2a3a, #0d1720); }
  .card-chord .card-tag { background: #74b9ff33; color: #a0d2ff; }

  .card-color        { background: linear-gradient(145deg, #3a2a3a, #1f1720); }
  .card-color .card-tag { background: #fd79a833; color: #fdabb5; }

  .card-garden       { background: linear-gradient(145deg, #1a3a1a, #0d1f0d); }
  .card-garden .card-tag { background: #55efc433; color: #8fffd5; }

  .card-eco           { background: linear-gradient(145deg, #2a3a2a, #171f17); }
  .card-eco .card-tag { background: #81ecec33; color: #a8ffff; }

  .card-gravity       { background: linear-gradient(145deg, #1a2a3a, #0d1720); }
  .card-gravity .card-tag { background: #4b7bec33; color: #7aa2f7; }

  .card-collapse      { background: linear-gradient(145deg, #3a2a1a, #1f170d); }
  .card-collapse .card-tag { background: #f39c1233; color: #fdcb6e; }

  .card-rpg           { background: linear-gradient(145deg, #2a1a3a, #170d1f); }
  .card-rpg .card-tag { background: #e8439333; color: #fd79a8; }

  /* ── Featured card ── */
  .featured {
    position: relative;
    border-radius: 22px;
    padding: 44px 36px 36px;
    text-decoration: none;
    color: #fff;
    transition: transform 0.3s, box-shadow 0.3s;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: linear-gradient(145deg, #2a1a3a, #0f0a20, #1a0d2a);
    border: 1px solid rgba(232, 67, 147, 0.25);
  }

  .featured::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 80% 20%, rgba(253, 121, 168, 0.1), transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(108, 92, 231, 0.08), transparent 60%);
    pointer-events: none;
  }

  .featured:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(232, 67, 147, 0.15);
  }

  .featured:active { transform: translateY(-1px) scale(1.0); }

  .featured-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #e84393, #fd79a8);
    color: #fff;
    width: fit-content;
    position: relative;
    z-index: 1;
  }

  .featured-icon {
    font-size: 3.2rem;
    line-height: 1;
    position: relative;
    z-index: 1;
  }

  .featured-title {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: 2px;
    position: relative;
    z-index: 1;
  }

  .featured-desc {
    font-size: 1rem;
    color: #c0b0e0;
    line-height: 1.7;
    max-width: 600px;
    position: relative;
    z-index: 1;
  }

  .featured-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .featured-tag {
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.08);
    color: #b0b0cc;
    letter-spacing: 0.5px;
  }

  footer {
    margin-top: 60px;
    color: #555;
    font-size: 0.85rem;
  }

  /* ── Mobile layout ── */
  @media (max-width: 600px), (hover: none) and (pointer: coarse) {
    body { padding: 24px 12px 40px; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    .subtitle { font-size: 0.9rem; margin-bottom: 28px; }
    .section { margin-bottom: 24px; }
    .section-header { margin-bottom: 12px; gap: 8px; }
    .section-title { font-size: 1rem; }
    .section-dot { width: 8px; height: 8px; }
    .section-subtitle { font-size: 0.78rem; margin-top: -8px; margin-bottom: 12px; }

    .featured { padding: 24px 18px; }
    .featured-icon { font-size: 2.2rem; }
    .featured-title { font-size: 1.3rem; }
    .featured-desc { font-size: 0.85rem; -webkit-line-clamp: 3; }
    .featured-tag { font-size: 0.68rem; padding: 2px 8px; }

    .grid {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      flex-direction: row;
      padding: 18px 16px;
      border-radius: 14px;
      gap: 14px;
    }
    .card:hover { transform: none; box-shadow: none; }
    .card:active { transform: scale(0.98); }
    .card-icon { font-size: 2rem; }
    .card-content { flex: 1; min-width: 0; }
    .card-title { font-size: 1.05rem; margin-bottom: 2px; }
    .card-desc {
      font-size: 0.78rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-tag { margin-top: 4px; font-size: 0.68rem; padding: 2px 8px; }

    footer { margin-top: 32px; font-size: 0.78rem; }
  }
</style>
</head>
<body>

<h1>GAME HUB</h1>
<p class="subtitle" id="subtitle">选一个游戏，立即开始</p>

<!-- Featured Game -->
<div class="section">
  <a class="featured" id="featured-card">
    <!-- Injected by JS -->
  </a>
</div>

<!-- Completed Games -->
<div class="section">
  <div class="section-header">
    <span class="section-dot dot-done"></span>
    <span class="section-title">已完成</span>
    <span class="section-line"></span>
  </div>
  <p class="section-subtitle" id="done-subtitle">可以正常游玩，功能完整</p>

  <div class="grid" id="done-grid">
    <!-- Cards injected by JS -->
  </div>
</div>

<!-- Work in Progress (desktop only) -->
<div class="section" id="wip-section">
  <div class="section-header">
    <span class="section-dot dot-wip"></span>
    <span class="section-title">开发中</span>
    <span class="section-line"></span>
  </div>
  <p class="section-subtitle">还在完善中，体验可能不够完善</p>

  <div class="grid" id="wip-grid">
    <!-- Cards injected by JS -->
  </div>
</div>

<footer id="footer">加载中...</footer>

<script>
// Detect mobile: touch + small screen / coarse pointer
const isMobile = ('ontouchstart' in window) && (window.innerWidth < 800 || matchMedia('(pointer: coarse)').matches);

const games = [
  { name: '贪吃蛇',     icon: '🐍', desc: '经典贪吃蛇，操控方向吃掉食物，越吃越长，别撞到自己和墙壁。',       tag: '经典', css: 'slime',   file: '01-snake',             mobile: true },
  { name: '创意贪吃蛇', icon: '🐉', desc: '道具版贪吃蛇，地图上散落各种增益道具，让游戏更加刺激有趣。',         tag: '道具', css: 'candy',   file: '02-snake-creative',    mobile: true },
  { name: '反向贪吃蛇', icon: '🍎', desc: '你操控"食物"，躲避 AI 蛇的追击。放陷阱、求生存，看你能活多久！',   tag: '生存', css: 'reverse', file: '03-reverse-snake',     mobile: true },
  { name: '禅意叠叠乐', icon: '🧘', desc: '精准放置方块，追求完美堆叠。在宁静氛围中挑战耐心与手眼协调。',       tag: '休闲', css: 'zen',     file: '04-zen-stack',         mobile: true },
  { name: '打砖块',     icon: '🧱', desc: '反弹小球击碎所有砖块，别让球掉落，挑战更高分数。',                   tag: '街机', css: 'brick',   file: '05-breakout',          mobile: true },
  { name: '拆弹专家',   icon: '💣', desc: '扫雷逻辑的炸弹包装，倒计时让每步都是生死抉择。剪对线，拆掉炸弹！',  tag: '解谜', css: 'bomb',    file: '06-demolition-expert', mobile: true },
  { name: '轮回密码',   icon: '🔄', desc: '被困在无限重置的 24 小时，每次死亡只能记住一条信息。',              tag: '叙事', css: 'loop',    file: '07-loop-cipher',       mobile: true },
  { name: '时间导演',   icon: '⏱️', desc: '录制自己的操作，和过去的自己协作通关。站在自己肩上，跳得更高！',     tag: '平台', css: 'time',    file: '08-time-director',     mobile: true },
  { name: 'Bug猎人',    icon: '🐛', desc: '游戏故意出 Bug，你来修复——它知道自己是个游戏，并且会吐槽你。',      tag: 'Meta', css: 'bug',     file: '09-bug-hunter',        mobile: true },
  { name: '弦月',       icon: '🌙', desc: '充能轨道轻滑发射，让弹道穿过移动障碍——每一道轨迹都在夜空中累积成画。', tag: '物理', css: 'chord',   file: '10-chord-moon',        mobile: false },
  { name: '色环',          icon: '🎨', desc: '旋转色环上等待目标颜色转过指示器，轻点捕获。等待本身就是一种玩法。',     tag: '休闲', css: 'color',    file: '11-color-ring',        mobile: false },
  { name: '引力崩塌',       icon: '🌋', desc: '方块不会立刻锁定——结构不稳就会倒塌，连锁崩塌带来极致的视觉爽感。',    tag: '方块', css: 'collapse', file: '12-gravity-collapse',  mobile: false },
];

const wipGames = [
  { name: '重力翻转',      icon: '🌀', desc: '消行获得翻转权，改变重力方向（上下左右），让方块从新方向掉落。',       tag: '方块', css: 'gravity',  file: 'dev-5-gravity-flip' },
  { name: '地牢勇者 RPG', icon: '⚔️', desc: '探索地牢，击败怪物，收集装备，成为最强勇者。',                       tag: 'RPG',  css: 'dungeon',  file: 'dev-1-rpg' },
  { name: '元素方块',     icon: '🟦', desc: '经典方块消除，旋转下落填满整行，考验你的反应和策略。',               tag: '益智', css: 'element',  file: 'dev-2-tetris' },
  { name: '指尖花园',     icon: '🌸', desc: '轻点画布放置吸引子，引导粒子沿流场绘制出独一无二的抽象画。',         tag: '艺术', css: 'garden',   file: 'dev-3-zen-garden' },
  { name: '微瓶生态',     icon: '🌿', desc: '在微型瓶子里放置生物，看着它们繁衍、竞争、共生——每次干预都是蝴蝶效应。', tag: '模拟', css: 'eco',      file: 'dev-4-micro-ecosystem' },
];

const doneGrid = document.getElementById('done-grid');
const wipGrid  = document.getElementById('wip-grid');
const wipSection = document.getElementById('wip-section');

function createCard(game, path) {
  const a = document.createElement('a');
  a.className = `card card-${game.css}`;
  a.href = path + '/games/' + game.file + '.html';
  if (isMobile) {
    a.innerHTML = `
      <span class="card-icon">${game.icon}</span>
      <div class="card-content">
        <div class="card-title">${game.name}</div>
        <div class="card-desc">${game.desc}</div>
        <span class="card-tag">${game.tag}</span>
      </div>`;
  } else {
    a.innerHTML = `
      <span class="card-icon">${game.icon}</span>
      <span class="card-title">${game.name}</span>
      <span class="card-desc">${game.desc}</span>
      <span class="card-tag">${game.tag}</span>`;
  }
  return a;
}

const prefix = isMobile ? 'mobile' : '.';

// Featured game
const featured = {
  name: 'RPG Buff 探险者',
  icon: '⚔️',
  desc: '像素风地城 Roguelite。探索多层地牢，击败怪物 Boss，在每层结束时从海量 Buff 中选择搭配——吸血、反伤、暴击协同、职业加成、主动技能。5 个存档位，深度 build 构筑，无限重玩。',
  tags: ['Roguelite', 'Build 构筑', '多主题', '深度战斗'],
  file: 'rpg-buff-explorer/index',
  mobile: false,
};

const featuredCard = document.getElementById('featured-card');
featuredCard.href = prefix + '/games/' + featured.file + '.html';
featuredCard.innerHTML = `
  <span class="featured-badge">🔥 重点推荐</span>
  <span class="featured-icon">${featured.icon}</span>
  <span class="featured-title">${featured.name}</span>
  <span class="featured-desc">${featured.desc}</span>
  <div class="featured-tags">
    ${featured.tags.map(t => `<span class="featured-tag">${t}</span>`).join('')}
  </div>
`;

if (isMobile) {
  document.getElementById('subtitle').textContent = '选一个游戏，立即开始（移动端）';
  document.getElementById('done-subtitle').textContent = '已适配移动端';
  wipSection.style.display = 'none';

  const mobileGames = games.filter(g => g.mobile);
  mobileGames.forEach(g => doneGrid.appendChild(createCard(g, prefix)));

  document.getElementById('footer').textContent =
    `共 ${mobileGames.length} 款小游戏（移动端） &mdash; 全部免费，即点即玩`;

  // Hide featured on mobile since it's not mobile-ready yet
  featuredCard.parentElement.style.display = 'none';
} else {
  games.forEach(g => doneGrid.appendChild(createCard(g, prefix)));
  wipGames.forEach(g => wipGrid.appendChild(createCard(g, prefix)));

  document.getElementById('footer').textContent =
    `共 ${games.length + wipGames.length + 1} 款小游戏 &mdash; 全部免费，即点即玩`;
}
</script>

</body>
</html>
