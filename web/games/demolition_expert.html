<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>拆弹专家</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  user-select: none;
}
canvas {
  border-radius: 8px;
  box-shadow: 0 0 60px rgba(0,0,0,0.6);
  cursor: pointer;
}
#volBtn {
  position: fixed;
  top: 16px;
  right: 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid #555;
  border-radius: 6px;
  color: #eee;
  font-size: 18px;
  padding: 6px 12px;
  cursor: pointer;
  transition: background 0.2s;
  line-height: 1;
  z-index: 10;
}
#volBtn:hover { background: rgba(255,255,255,0.2); }
#volBtn.muted { color: #666; border-color: #444; }

#helpBtn {
  position: fixed; top: 16px; left: 16px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid #555;
  color: #eee; font-size: 18px; font-weight: bold; cursor: pointer;
  transition: background 0.2s; z-index: 10;
  display: flex; align-items: center; justify-content: center;
}
#helpBtn:hover { background: rgba(255,255,255,0.2); }

#helpOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 100;
  display: none; justify-content: center; align-items: center;
}
#helpOverlay.show { display: flex; }
#helpOverlay .help-box {
  background: linear-gradient(135deg, #1a1a3e, #0d0d1f);
  border: 1px solid rgba(243,156,18,0.3); border-radius: 16px;
  padding: 32px 40px; max-width: 440px; text-align: center;
  box-shadow: 0 0 40px rgba(243,156,18,0.1);
}
#helpOverlay h2 {
  color: #f39c12; font-size: 22px; margin-bottom: 16px;
  text-shadow: 0 0 10px rgba(243,156,18,0.5);
}
#helpOverlay .help-grid {
  text-align: left; font-size: 14px; color: #ccc; line-height: 2;
  margin-bottom: 12px;
}
#helpOverlay .help-grid kbd {
  background: rgba(255,255,255,0.12); padding: 2px 8px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.2); font-family: inherit; margin-right: 6px;
}
#helpOverlay .close-hint { color: #666; font-size: 12px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="volBtn">🎵</button>
<button id="helpBtn">?</button>
<div id="helpOverlay">
  <div class="help-box">
    <h2>💣 拆弹专家 — 玩法说明</h2>
    <div class="help-grid">
      <div><kbd>左键点击</kbd> 揭开电路节点（剪断电线）</div>
      <div><kbd>右键点击</kbd> 标记炸弹位置（插上旗标）</div>
    </div>
    <div style="text-align:left;font-size:13px;color:#aaa;line-height:1.8;margin-bottom:12px;">
      • 数字表示周围 8 格中的炸弹数量<br>
      • 首次点击绝对安全<br>
      • 揭开所有安全节点即可拆除炸弹<br>
      • 三种难度：闹钟(9×9)、定时炸弹(12×12)、核弹(16×16)<br>
      • 倒计时结束前完成拆除，否则任务失败
    </div>
    <div class="close-hint">按 Esc 或点击背景关闭</div>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

/* ── Sound Engine (Web Audio API) ── */
const Audio = (() => {
  let ac, muted = localStorage.getItem('demolition_muted') === '1';
  const init = () => { if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); };
  const note = (freq, dur, type = 'square', vol = 0.12, delay = 0) => {
    if (muted) return;
    init();
    const t = ac.currentTime + delay;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g).connect(ac.destination);
    o.start(t);
    o.stop(t + dur);
  };

  return {
    reveal() {
      note(880, 0.05, 'sine', 0.08);
    },
    flag() {
      note(440, 0.06, 'square', 0.1);
      note(660, 0.08, 'square', 0.1, 0.04);
    },
    unflag() {
      note(330, 0.05, 'square', 0.08);
    },
    explode() {
      init();
      if (muted) return;
      const t = ac.currentTime;
      // Noise burst
      const bufferSize = ac.sampleRate * 0.8;
      const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      const src = ac.createBufferSource();
      src.buffer = buffer;
      const g = ac.createGain();
      g.gain.setValueAtTime(0.4, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      src.connect(g).connect(ac.destination);
      src.start(t);
      // Low boom
      const o = ac.createOscillator();
      const g2 = ac.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(80, t);
      o.frequency.exponentialRampToValueAtTime(20, t + 0.6);
      g2.gain.setValueAtTime(0.3, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      o.connect(g2).connect(ac.destination);
      o.start(t);
      o.stop(t + 0.6);
    },
    victory() {
      note(523, 0.1, 'square', 0.12);
      note(659, 0.1, 'square', 0.12, 0.1);
      note(784, 0.1, 'square', 0.12, 0.2);
      note(1047, 0.2, 'square', 0.14, 0.3);
    },
    tick() {
      note(1000, 0.02, 'sine', 0.04);
    },
    hover() {
      note(1200, 0.02, 'sine', 0.03);
    },
    click() {
      note(600, 0.04, 'square', 0.08);
    },
    gameOver() {
      note(440, 0.25, 'sawtooth', 0.15);
      note(330, 0.3, 'sawtooth', 0.15, 0.2);
      note(220, 0.5, 'sawtooth', 0.15, 0.45);
    },
    setMuted(v) {
      muted = v;
      localStorage.setItem('demolition_muted', muted ? '1' : '0');
    }
  };
})();

// ── Canvas size ──
const W = 800, H = 700;
canvas.width = W;
canvas.height = H;

// ── Difficulty configs ──
const DIFFICULTIES = [
  { name: '闹钟', icon: '⏰', rows: 9, cols: 9, mines: 10, time: 300, label: '简单' },
  { name: '定时炸弹', icon: '💣', rows: 12, cols: 12, mines: 25, time: 240, label: '中等' },
  { name: '核弹', icon: '☢️', rows: 16, cols: 16, mines: 50, time: 240, label: '困难' },
];

// ── Number colors ──
const NUM_COLORS = [
  '', '#5dade2', '#2ecc71', '#e74c3c', '#8e44ad', '#e67e22', '#1abc9c', '#ecf0f1', '#95a5a6'
];

// ── Game state ──
let state = 'menu'; // menu | playing | gameover | victory
let difficulty = 1;
let board = [];
let cellSize, gridX, gridY;
let timer, timerInterval;
let flagsPlaced = 0;
let revealedCount = 0;
let totalSafe;
let firstClick = true;
let gameOverTime = 0;
let victoryTime = 0;
let shakeTimer = 0, shakeIntensity = 0;
let particles = [];
let explosions = [];
let wires = []; // wire-cut victory wires
let hoverCell = null;
let bestTimes = {};
let lastTickSound = -1;
let tickTimer = 0;
let bgPulse = 0;

// ── Buttons ──
const buttons = {
  diff: [],
  restart: null,
  home: null,
};

// Load best times
try {
  const saved = localStorage.getItem('demolition_best');
  if (saved) bestTimes = JSON.parse(saved);
} catch(e) {}

function saveBestTime(diffIdx, time) {
  const key = diffIdx;
  if (!bestTimes[key] || time < bestTimes[key]) {
    bestTimes[key] = time;
    localStorage.setItem('demolition_best', JSON.stringify(bestTimes));
  }
}

// ── Vol button ──
const volBtn = document.getElementById('volBtn');
let isMuted = localStorage.getItem('demolition_muted') === '1';
if (isMuted) { volBtn.textContent = '🔇'; volBtn.classList.add('muted'); }
volBtn.addEventListener('click', () => {
  isMuted = !isMuted;
  Audio.setMuted(isMuted);
  volBtn.textContent = isMuted ? '🔇' : '🎵';
  volBtn.classList.toggle('muted', isMuted);
});

// ── Help overlay ──
const helpOverlayDem = document.getElementById('helpOverlay');
document.getElementById('helpBtn').addEventListener('click', () => {
  helpOverlayDem.classList.add('show');
});
helpOverlayDem.addEventListener('click', (e) => {
  if (e.target === helpOverlayDem) helpOverlayDem.classList.remove('show');
});
document.addEventListener('keydown', (e) => {
  if (helpOverlayDem.classList.contains('show') && e.code === 'Escape') helpOverlayDem.classList.remove('show');
});

// ── Board helpers ──
function computeGrid() {
  const diff = DIFFICULTIES[difficulty];
  const maxW = W - 80;
  const maxH = H - 200;
  cellSize = Math.floor(Math.min(maxW / diff.cols, maxH / diff.rows));
  cellSize = Math.max(cellSize, 24);
  cellSize = Math.min(cellSize, 42);
  const gridW = cellSize * diff.cols;
  const gridH = cellSize * diff.rows;
  gridX = Math.floor((W - gridW) / 2);
  gridY = 170;
}

function cellToPixel(r, c) {
  return { x: gridX + c * cellSize, y: gridY + r * cellSize };
}

function pixelToCell(px, py) {
  const c = Math.floor((px - gridX) / cellSize);
  const r = Math.floor((py - gridY) / cellSize);
  const diff = DIFFICULTIES[difficulty];
  if (r >= 0 && r < diff.rows && c >= 0 && c < diff.cols) return { r, c };
  return null;
}

function createBoard() {
  const diff = DIFFICULTIES[difficulty];
  board = [];
  for (let r = 0; r < diff.rows; r++) {
    board[r] = [];
    for (let c = 0; c < diff.cols; c++) {
      board[r][c] = { mine: false, revealed: false, flagged: false, number: 0 };
    }
  }
}

function placeMines(safeR, safeC) {
  const diff = DIFFICULTIES[difficulty];
  let placed = 0;
  // Safe zone: the clicked cell and its neighbors
  const safeZone = new Set();
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const nr = safeR + dr, nc = safeC + dc;
      if (nr >= 0 && nr < diff.rows && nc >= 0 && nc < diff.cols) {
        safeZone.add(nr * diff.cols + nc);
      }
    }
  }

  while (placed < diff.mines) {
    const r = Math.floor(Math.random() * diff.rows);
    const c = Math.floor(Math.random() * diff.cols);
    if (!board[r][c].mine && !safeZone.has(r * diff.cols + c)) {
      board[r][c].mine = true;
      placed++;
    }
  }

  // Calculate numbers
  for (let r = 0; r < diff.rows; r++) {
    for (let c = 0; c < diff.cols; c++) {
      if (board[r][c].mine) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < diff.rows && nc >= 0 && nc < diff.cols && board[nr][nc].mine) count++;
        }
      }
      board[r][c].number = count;
    }
  }
}

function revealCell(r, c) {
  const diff = DIFFICULTIES[difficulty];
  if (r < 0 || r >= diff.rows || c < 0 || c >= diff.cols) return;
  if (board[r][c].revealed || board[r][c].flagged) return;

  board[r][c].revealed = true;
  revealedCount++;

  if (board[r][c].number === 0 && !board[r][c].mine) {
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        revealCell(r + dr, c + dc);
      }
    }
  }
}

function checkWin() {
  const diff = DIFFICULTIES[difficulty];
  totalSafe = diff.rows * diff.cols - diff.mines;
  if (revealedCount >= totalSafe) {
    state = 'victory';
    victoryTime = Date.now();
    clearInterval(timerInterval);
    Audio.victory();
    saveBestTime(difficulty, timer);
    // Create wire-cut particles
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      const color = ['#2ecc71', '#3498db', '#f1c40f', '#e74c3c'][Math.floor(Math.random() * 4)];
      particles.push({
        x: W / 2, y: H / 2,
        dx: Math.cos(angle) * speed,
        dy: Math.sin(angle) * speed,
        life: 1, decay: 0.008 + Math.random() * 0.01,
        size: 2 + Math.random() * 4, color
      });
    }
  }
}

function triggerExplosion(r, c) {
  state = 'gameover';
  gameOverTime = Date.now();
  clearInterval(timerInterval);
  Audio.explode();
  Audio.gameOver();
  shakeTimer = 60;
  shakeIntensity = 12;

  // Reveal all mines
  const diff = DIFFICULTIES[difficulty];
  for (let rr = 0; rr < diff.rows; rr++) {
    for (let cc = 0; cc < diff.cols; cc++) {
      if (board[rr][cc].mine) board[rr][cc].revealed = true;
    }
  }

  // Explosion particles at clicked cell
  const pos = cellToPixel(r, c);
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 8;
    const color = ['#e74c3c', '#f39c12', '#e67e22', '#c0392b', '#ff6348'][Math.floor(Math.random() * 5)];
    particles.push({
      x: pos.x + cellSize / 2, y: pos.y + cellSize / 2,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 1, decay: 0.005 + Math.random() * 0.015,
      size: 3 + Math.random() * 6, color
    });
  }

  // Explosion ring
  explosions.push({
    x: pos.x + cellSize / 2, y: pos.y + cellSize / 2,
    radius: 0, maxRadius: cellSize * 4, life: 1, decay: 0.02,
    color: '#e74c3c'
  });
}

function startGame() {
  computeGrid();
  createBoard();
  firstClick = true;
  flagsPlaced = 0;
  revealedCount = 0;
  timer = DIFFICULTIES[difficulty].time;
  state = 'playing';
  particles = [];
  explosions = [];
  shakeTimer = 0;
  lastTickSound = -1;
  Audio.click();
  computeButtons();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (state !== 'playing') return;
    timer--;
    if (timer <= 0) {
      timer = 0;
      // Time's up - find and explode first mine
      clearInterval(timerInterval);
      const diff = DIFFICULTIES[difficulty];
      for (let r = 0; r < diff.rows; r++) {
        for (let c = 0; c < diff.cols; c++) {
          if (board[r][c].mine) { triggerExplosion(r, c); return; }
        }
      }
      state = 'gameover';
      gameOverTime = Date.now();
      Audio.gameOver();
    }
    // Tick sound when under 30s
    if (timer <= 30 && timer > 0 && timer !== lastTickSound) {
      lastTickSound = timer;
      Audio.tick();
    }
  }, 1000);
}

function computeButtons() {
  buttons.diff = [];
  const btnW = 140, btnH = 36, gap = 16;
  const totalW = 3 * btnW + 2 * gap;
  const startX = (W - totalW) / 2;
  const btnY = 30;
  for (let i = 0; i < 3; i++) {
    buttons.diff.push({ x: startX + i * (btnW + gap), y: btnY, w: btnW, h: btnH, idx: i });
  }
  buttons.restart = { x: W / 2 - 80, y: H - 60, w: 160, h: 40 };
  buttons.home = { x: W / 2 - 80, y: H - 110, w: 160, h: 40 };
}

// ── Input ──
let mouseX = W / 2, mouseY = H / 2;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top) * (H / rect.height);

  // Hover detection for diff buttons on menu
  if (state === 'menu') {
    for (const b of buttons.diff) {
      if (mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h) {
        canvas.style.cursor = 'pointer';
        return;
      }
    }
    canvas.style.cursor = 'default';
    return;
  }

  // Grid hover
  if (state === 'playing') {
    const cell = pixelToCell(mouseX, mouseY);
    if (cell) {
      hoverCell = cell;
      canvas.style.cursor = 'crosshair';
      return;
    }
  }
  hoverCell = null;
  canvas.style.cursor = 'default';
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  if (state === 'menu') {
    for (const b of buttons.diff) {
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
        difficulty = b.idx;
        startGame();
        return;
      }
    }
    return;
  }

  if (state === 'gameover' || state === 'victory') {
    if (buttons.restart && mx >= buttons.restart.x && mx <= buttons.restart.x + buttons.restart.w &&
        my >= buttons.restart.y && my <= buttons.restart.y + buttons.restart.h) {
      Audio.click();
      startGame();
      return;
    }
    if (buttons.home && mx >= buttons.home.x && mx <= buttons.home.x + buttons.home.w &&
        my >= buttons.home.y && my <= buttons.home.y + buttons.home.h) {
      window.location.href = '../index.html';
      return;
    }
    return;
  }

  if (state === 'playing') {
    const cell = pixelToCell(mx, my);
    if (cell) {
      const { r, c } = cell;
      if (board[r][c].flagged || board[r][c].revealed) return;

      if (firstClick) {
        firstClick = false;
        placeMines(r, c);
        totalSafe = DIFFICULTIES[difficulty].rows * DIFFICULTIES[difficulty].cols - DIFFICULTIES[difficulty].mines;
      }

      if (board[r][c].mine) {
        triggerExplosion(r, c);
      } else {
        revealCell(r, c);
        Audio.reveal();
        checkWin();
      }
    }
  }
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const cell = pixelToCell(mx, my);
  if (!cell) return;
  const { r, c } = cell;
  if (board[r][c].revealed) return;

  if (board[r][c].flagged) {
    board[r][c].flagged = false;
    flagsPlaced--;
    Audio.unflag();
  } else {
    board[r][c].flagged = true;
    flagsPlaced++;
    Audio.flag();
  }
});

// ── Draw helpers ──
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawCell(r, c) {
  const cell = board[r][c];
  const pos = cellToPixel(r, c);
  const x = pos.x, y = pos.y;
  const s = cellSize;
  const pad = 1;
  const isHovered = hoverCell && hoverCell.r === r && hoverCell.c === c;

  if (cell.revealed) {
    // Revealed cell - circuit trace style
    if (cell.mine) {
      // Mine cell
      ctx.fillStyle = '#1a0a0a';
      ctx.fillRect(x + pad, y + pad, s - pad * 2, s - pad * 2);
      ctx.strokeStyle = '#e74c3c';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x + pad + 1, y + pad + 1, s - pad * 2 - 2, s - pad * 2 - 2);

      // Bomb circle
      const cx = x + s / 2, cy = y + s / 2;
      const bombR = s * 0.3;
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.arc(cx, cy, bombR, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.arc(cx, cy, bombR * 0.7, 0, Math.PI * 2);
      ctx.fill();

      // Bomb dot
      ctx.fillStyle = '#2c0505';
      ctx.beginPath();
      ctx.arc(cx, cy, bombR * 0.25, 0, Math.PI * 2);
      ctx.fill();

      // Fuse lines
      for (let a = 0; a < 4; a++) {
        const angle = (a * Math.PI / 2) + Math.PI / 4;
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * bombR, cy + Math.sin(angle) * bombR);
        ctx.lineTo(cx + Math.cos(angle) * bombR * 1.6, cy + Math.sin(angle) * bombR * 1.6);
        ctx.stroke();
      }
    } else {
      // Safe revealed cell
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(x + pad, y + pad, s - pad * 2, s - pad * 2);

      // Circuit trace lines
      ctx.strokeStyle = 'rgba(46, 204, 113, 0.15)';
      ctx.lineWidth = 0.5;
      const cx = x + s / 2, cy = y + s / 2;
      if (r > 0) {
        ctx.beginPath(); ctx.moveTo(cx, y); ctx.lineTo(cx, cy); ctx.stroke();
      }
      if (c > 0) {
        ctx.beginPath(); ctx.moveTo(x, cy); ctx.lineTo(cx, cy); ctx.stroke();
      }

      // Number
      if (cell.number > 0) {
        const fontSize = Math.max(12, s * 0.55);
        ctx.fillStyle = NUM_COLORS[cell.number];
        ctx.font = `bold ${fontSize}px "Segoe UI", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(cell.number.toString(), cx, cy + 1);
        ctx.textBaseline = 'alphabetic';
      }

      // Node dot
      if (cell.number === 0) {
        ctx.fillStyle = 'rgba(46, 204, 113, 0.3)';
        ctx.beginPath();
        ctx.arc(cx, cy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  } else {
    // Unrevealed cell - circuit board node
    const isDiff = DIFFICULTIES[difficulty];

    // Base cell color with subtle gradient
    const grad = ctx.createLinearGradient(x, y, x + s, y + s);
    if (isHovered && state === 'playing' && !cell.flagged) {
      grad.addColorStop(0, '#2a2a4a');
      grad.addColorStop(1, '#1f1f3a');
    } else {
      grad.addColorStop(0, '#1a1a3a');
      grad.addColorStop(1, '#14142a');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(x + pad, y + pad, s - pad * 2, s - pad * 2);

    // Grid border
    ctx.strokeStyle = isHovered ? 'rgba(100,100,180,0.5)' : 'rgba(60,60,120,0.35)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x + pad + 0.5, y + pad + 0.5, s - pad * 2 - 1, s - pad * 2 - 1);

    // Circuit node in center
    const cx = x + s / 2, cy = y + s / 2;
    const nodeR = Math.max(2, s * 0.08);

    if (cell.flagged) {
      // Flag marker - red triangle
      ctx.fillStyle = '#e74c3c';
      ctx.shadowColor = '#e74c3c';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(cx - 2, cy - s * 0.2);
      ctx.lineTo(cx + s * 0.22, cy - s * 0.05);
      ctx.lineTo(cx - 2, cy + s * 0.15);
      ctx.closePath();
      ctx.fill();
      // Flag pole
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx - 2, cy - s * 0.22);
      ctx.lineTo(cx - 2, cy + s * 0.22);
      ctx.stroke();
      ctx.shadowBlur = 0;
    } else {
      // Small circuit pad
      ctx.fillStyle = isHovered ? 'rgba(100,100,200,0.6)' : 'rgba(70,70,140,0.4)';
      ctx.beginPath();
      ctx.arc(cx, cy, nodeR, 0, Math.PI * 2);
      ctx.fill();

      // Connection traces (decorative)
      ctx.strokeStyle = 'rgba(60,60,140,0.2)';
      ctx.lineWidth = 0.5;
      if (c > 0) {
        ctx.beginPath();
        ctx.moveTo(cx + nodeR, cy);
        ctx.lineTo(x + s - pad, cy);
        ctx.stroke();
      }
      if (r > 0) {
        ctx.beginPath();
        ctx.moveTo(cx, cy + nodeR);
        ctx.lineTo(cx, y + s - pad);
        ctx.stroke();
      }
    }
  }
}

// ── Main draw ──
function draw() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity;
    const sy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(sx, sy);
    shakeIntensity *= 0.95;
    shakeTimer--;
  }

  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#0f0c29');
  bgGrad.addColorStop(0.5, '#302b63');
  bgGrad.addColorStop(1, '#24243e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  // Subtle circuit board background pattern
  ctx.strokeStyle = 'rgba(60, 60, 120, 0.08)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  if (state === 'menu') {
    drawMenu();
  } else if (state === 'playing' || state === 'gameover' || state === 'victory') {
    drawGame();
  }

  // Particles (always render on top)
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.dx;
    p.y += p.dy;
    p.dy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 4;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Explosions
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.radius += (ex.maxRadius - ex.radius) * 0.1;
    ex.life -= ex.decay;
    if (ex.life <= 0) { explosions.splice(i, 1); continue; }
    ctx.globalAlpha = ex.life * 0.6;
    ctx.strokeStyle = ex.color;
    ctx.lineWidth = 3 * ex.life;
    ctx.shadowColor = ex.color;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  ctx.restore();
  requestAnimationFrame(draw);
}

function drawMenu() {
  // Title
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 52px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#f39c12';
  ctx.shadowBlur = 30;
  ctx.fillText('拆弹专家', W / 2, 140);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '16px "Segoe UI", sans-serif';
  ctx.fillText('在倒计时结束前拆除所有炸弹', W / 2, 175);

  // Bomb icon decoration
  const iconY = 210;
  ctx.font = '80px "Segoe UI", sans-serif';
  ctx.fillText('💣', W / 2, iconY + 70);

  // Difficulty buttons
  computeButtons();
  const labels = ['简单 - 闹钟', '中等 - 定时炸弹', '困难 - 核弹'];
  const icons = ['⏰', '💣', '☢️'];
  const gridInfo = ['9x9 | 10 枚炸弹 | 5:00', '12x12 | 25 枚炸弹 | 4:00', '16x16 | 50 枚炸弹 | 4:00'];

  for (let i = 0; i < 3; i++) {
    const b = buttons.diff[i];
    const hovered = mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h;
    const isBest = bestTimes[i] !== undefined;

    // Button background
    const btnGrad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    if (i === 0) {
      btnGrad.addColorStop(0, hovered ? '#27ae60' : '#1e8449');
      btnGrad.addColorStop(1, hovered ? '#1e8449' : '#196f3d');
    } else if (i === 1) {
      btnGrad.addColorStop(0, hovered ? '#d4a017' : '#b7950b');
      btnGrad.addColorStop(1, hovered ? '#b7950b' : '#9a7d0a');
    } else {
      btnGrad.addColorStop(0, hovered ? '#e74c3c' : '#c0392b');
      btnGrad.addColorStop(1, hovered ? '#c0392b' : '#a93226');
    }
    ctx.fillStyle = btnGrad;
    drawRoundedRect(b.x, b.y, b.w, b.h, 8);
    ctx.fill();

    // Glow effect
    if (hovered) {
      ctx.shadowColor = i === 0 ? '#2ecc71' : i === 1 ? '#f1c40f' : '#e74c3c';
      ctx.shadowBlur = 15;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Icon and label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${icons[i]} ${labels[i]}`, b.x + b.w / 2, b.y + 16);

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '10px "Segoe UI", sans-serif';
    ctx.fillText(gridInfo[i], b.x + b.w / 2, b.y + 30);

    // Best time
    if (isBest) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '9px "Segoe UI", sans-serif';
      ctx.fillText(`最佳: ${formatTime(bestTimes[i])}`, b.x + b.w / 2, b.y + b.h + 14);
    }
  }

  // Instructions
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '13px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  const instrY = H - 100;
  ctx.fillText('左键点击揭开电路节点 (剪断电线)', W / 2, instrY);
  ctx.fillText('右键点击标记炸弹位置 (插上旗标)', W / 2, instrY + 22);
  ctx.fillText('首次点击绝对安全，放心开始', W / 2, instrY + 44);

  bgPulse += 0.02;
}

function drawGame() {
  const diff = DIFFICULTIES[difficulty];

  // Title bar
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${diff.icon} ${diff.name}`, W / 2, 35);

  // Timer
  const urgent = timer <= 30 && state === 'playing';
  const timerAlpha = urgent ? 0.7 + 0.3 * Math.sin(Date.now() * 0.01) : 1;
  ctx.globalAlpha = timerAlpha;
  ctx.fillStyle = urgent ? '#e74c3c' : '#ecf0f1';
  ctx.font = `bold ${urgent ? 36 : 28}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.shadowColor = urgent ? '#e74c3c' : 'transparent';
  ctx.shadowBlur = urgent ? 15 : 0;

  const timeStr = formatTime(timer);
  ctx.fillText(timeStr, W / 2, 72);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // Timer urgency bar
  if (state === 'playing') {
    const barW = 200, barH = 4;
    const barX = (W - barW) / 2, barY = 80;
    const progress = timer / diff.time;
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(barX, barY, barW, barH);
    const barGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
    if (urgent) {
      barGrad.addColorStop(0, '#e74c3c');
      barGrad.addColorStop(1, '#c0392b');
    } else {
      barGrad.addColorStop(0, '#2ecc71');
      barGrad.addColorStop(1, '#27ae60');
    }
    ctx.fillStyle = barGrad;
    ctx.fillRect(barX, barY, barW * progress, barH);
  }

  // Mine counter (left)
  const remaining = diff.mines - flagsPlaced;
  ctx.fillStyle = '#ecf0f1';
  ctx.font = 'bold 16px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`💣 ${remaining}`, 20, 30);

  // Flag count (right)
  ctx.textAlign = 'right';
  ctx.fillText(`🚩 ${flagsPlaced}`, W - 20, 30);

  // Progress indicator
  const progressPct = totalSafe > 0 ? (revealedCount / totalSafe * 100) : 0;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`已拆除 ${Math.floor(progressPct)}%`, W / 2, gridY + diff.rows * cellSize + 20);

  // Draw grid
  for (let r = 0; r < diff.rows; r++) {
    for (let c = 0; c < diff.cols; c++) {
      drawCell(r, c);
    }
  }

  // Game Over overlay
  if (state === 'gameover') {
    const elapsed = Math.min(1, (Date.now() - gameOverTime) / 500);
    ctx.globalAlpha = 0.5 * elapsed;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = elapsed;

    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 48px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#e74c3c';
    ctx.shadowBlur = 30;
    ctx.fillText('任务失败', W / 2, H / 2 - 60);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ecf0f1';
    ctx.font = '20px "Segoe UI", sans-serif';
    ctx.fillText(`用时 ${formatTime(diff.time - timer)} | 拆除 ${Math.floor(progressPct)}%`, W / 2, H / 2 - 10);

    // Buttons
    drawButton(buttons.restart, '再来一局', '#e74c3c', '#c0392b');
    drawButton(buttons.home, '返回主页', '#3498db', '#2e86c1');
    ctx.globalAlpha = 1;
  }

  // Victory overlay
  if (state === 'victory') {
    const elapsed = Math.min(1, (Date.now() - victoryTime) / 500);
    ctx.globalAlpha = 0.4 * elapsed;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = elapsed;

    ctx.fillStyle = '#2ecc71';
    ctx.font = 'bold 48px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#2ecc71';
    ctx.shadowBlur = 30;
    ctx.fillText('已拆除', W / 2, H / 2 - 60);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ecf0f1';
    ctx.font = '22px "Segoe UI", sans-serif';
    ctx.fillText(`耗时 ${formatTime(diff.time - timer)}`, W / 2, H / 2 - 10);

    const best = bestTimes[difficulty];
    if (best !== undefined) {
      ctx.fillStyle = '#f1c40f';
      ctx.font = '16px "Segoe UI", sans-serif';
      ctx.fillText(`最佳记录: ${formatTime(best)}`, W / 2, H / 2 + 20);
    }

    // Buttons
    drawButton(buttons.restart, '再来一局', '#2ecc71', '#27ae60');
    drawButton(buttons.home, '返回主页', '#3498db', '#2e86c1');
    ctx.globalAlpha = 1;
  }
}

function drawButton(b, label, color, darkColor) {
  const hovered = mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h;
  const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
  grad.addColorStop(0, hovered ? color : darkColor);
  grad.addColorStop(1, hovered ? darkColor : darkColor);
  ctx.fillStyle = grad;
  drawRoundedRect(b.x, b.y, b.w, b.h, 8);
  ctx.fill();

  if (hovered) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, b.x + b.w / 2, b.y + b.h / 2);
  ctx.textBaseline = 'alphabetic';
}

// ── Init ──
computeButtons();
draw();
</script>
